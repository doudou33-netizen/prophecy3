<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予言</title>
  <link rel="apple-touch-icon" href="IMG_8251.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #select-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      gap: 20px;
    }

    #select-screen h1 {
      color: #c9a84c;
      font-size: 28px;
      letter-spacing: 6px;
      margin-bottom: 10px;
    }

    #select-screen p {
      color: #555;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .cat-btn {
      width: 240px;
      padding: 16px;
      background: transparent;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-size: 16px;
      letter-spacing: 4px;
      border-radius: 30px;
    }

    .cat-btn:active {
      background: #c9a84c22;
    }

    #waiting {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    #waiting h1 {
      color: #c9a84c;
      font-size: 28px;
      letter-spacing: 6px;
    }

    #result {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      background: #0a0a0a;
    }

    .suit {
      font-size: 180px;
      line-height: 1;
      filter: drop-shadow(0 0 30px currentColor);
      animation: reveal 0.8s ease-out;
    }

    .suit.red    { color: #c0392b; }
    .suit.black  { color: #ecf0f1; }
    .suit.blue   { color: #2980b9; }
    .suit.green  { color: #27ae60; }
    .suit.yellow { color: #f1c40f; }

    .suit-name {
      font-size: 22px;
      letter-spacing: 8px;
      margin-top: 20px;
      animation: reveal 0.8s ease-out;
    }

    .suit-name.red    { color: #c0392b; }
    .suit-name.black  { color: #ecf0f1; }
    .suit-name.blue   { color: #2980b9; }
    .suit-name.green  { color: #27ae60; }
    .suit-name.yellow { color: #f1c40f; }

    .gold-line {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c9a84c, transparent);
      margin: 24px auto;
      animation: reveal 1s ease-out;
    }

    @keyframes reveal {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="select-screen">
    <h1>予　言</h1>
    <p>カテゴリを選んでください</p>
    <button class="cat-btn" onclick="selectCategory('mark')">♦ マーク</button>
    <button class="cat-btn" onclick="selectCategory('number')">１ 数字</button>
    <button class="cat-btn" onclick="selectCategory('color')">● 色</button>
    <button class="cat-btn" onclick="selectCategory('izakaya')">🍺 居酒屋</button>
  </div>

  <div id="waiting">
    <h1>予　言</h1>
  </div>

  <div id="result">
    <div class="gold-line"></div>
    <div class="suit" id="suitSymbol"></div>
    <div class="suit-name" id="suitName"></div>
    <div class="gold-line"></div>
  </div>

  <script>
    // 上→右→下→左（時計回り）= index 0→1→2→3
    const categories = {
      mark: [
        { symbol: '♦', name: 'ダイヤ',   color: 'red'   },
        { symbol: '♣', name: 'クラブ',   color: 'black' },
        { symbol: '♥', name: 'ハート',   color: 'red'   },
        { symbol: '♠', name: 'スペード', color: 'black' },
      ],
      number: [
        { symbol: '１', name: '', color: 'black' },
        { symbol: '２', name: '', color: 'black' },
        { symbol: '３', name: '', color: 'black' },
        { symbol: '４', name: '', color: 'black' },
      ],
      color: [
        { symbol: '●', name: '赤', color: 'red'   },
        { symbol: '●', name: '青', color: 'blue'  },
        { symbol: '●', name: '緑', color: 'green' },
        { symbol: '●', name: '黄', color: 'yellow'},
      ],
      izakaya: [
        { symbol: '🍽', name: '皿',       color: 'black' },
        { symbol: '🍺', name: 'コップ',   color: 'black' },
        { symbol: '🥢', name: '箸',       color: 'black' },
        { symbol: '🧻', name: 'おしぼり', color: 'black' },
      ],
    };

    // select → waiting(10秒) → stabilizing → ready → result
    let phase = 'select';
    let currentCategory = null;
    let baseBeta  = null;
    let baseGamma = null;
    let baseSign  = 1;

    let recentBetas  = [];
    let recentGammas = [];
    const STABLE_COUNT = 10;
    const STABLE_RANGE = 3;
    const THRESHOLD = 15;
    const DOMINANCE = 2.0;

    function selectCategory(cat) {
      if (phase !== 'select') return;
      currentCategory = cat;
      phase = 'cooldown';
      document.getElementById('select-screen').style.display = 'none';
      document.getElementById('waiting').style.display = 'flex';
      recentBetas  = [];
      recentGammas = [];

      // 10秒後にstabilizingへ
      setTimeout(function() {
        if (phase === 'cooldown') {
          phase = 'stabilizing';
        }
      }, 10000);
    }

    function showResult(index) {
      if (phase !== 'ready') return;
      phase = 'result';

      const suit = categories[currentCategory][index];
      document.getElementById('suitSymbol').textContent = suit.symbol;
      document.getElementById('suitSymbol').className = 'suit ' + suit.color;
      document.getElementById('suitName').textContent = suit.name;
      document.getElementById('suitName').className = 'suit-name ' + suit.color;

      document.getElementById('waiting').style.display = 'none';
      document.getElementById('result').style.display = 'flex';
    }

    function isStable(arr) {
      if (arr.length < STABLE_COUNT) return false;
      const recent = arr.slice(-STABLE_COUNT);
      return Math.max(...recent) - Math.min(...recent) <= STABLE_RANGE * 2;
    }

    function average(arr) {
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    window.addEventListener('deviceorientation', function(e) {
      const beta  = e.beta;
      const gamma = e.gamma;

      // cooldown：10秒間は何もしない
      if (phase === 'cooldown') return;

      // stabilizing：安定するまで値を収集して基準値を確定
      if (phase === 'stabilizing') {
        recentBetas.push(beta);
        recentGammas.push(gamma);
        if (isStable(recentBetas) && isStable(recentGammas)) {
          baseBeta  = average(recentBetas.slice(-STABLE_COUNT));
          baseGamma = average(recentGammas.slice(-STABLE_COUNT));
          // 机に置いた状態のbeta符号を記録
          baseSign = baseBeta >= 0 ? 1 : -1;
          phase = 'ready';
        }
        return;
      }

      // ready：基準値からの変化で判定
      if (phase === 'ready') {
        const diffBeta  = beta  - baseBeta;
        const diffGamma = gamma - baseGamma;
        const absBeta   = Math.abs(diffBeta);
        const absGamma  = Math.abs(diffGamma);

        if (absBeta >= THRESHOLD && absBeta >= absGamma * DOMINANCE) {
          // baseSignで上下を補正
          if (diffBeta * baseSign < 0) {
            showResult(0); // 上（カメラ側を持ち上げる）
          } else {
            showResult(2); // 下（ホーム側を持ち上げる）
          }
        } else if (absGamma >= THRESHOLD && absGamma >= absBeta * DOMINANCE) {
          if (diffGamma < 0) {
            showResult(1); // 裏面から見て右
          } else {
            showResult(3); // 裏面から見て左
          }
        }
        return;
      }
    });

    // iOS許可リクエスト
    window.addEventListener('load', function() {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.getElementById('select-screen').innerHTML = `
          <h1>予　言</h1>
          <button onclick="requestPermission()" style="padding:14px 36px; background:transparent; border:1px solid #c9a84c; color:#c9a84c; font-size:14px; letter-spacing:4px; border-radius:30px; margin-top:20px;">START</button>
        `;
      }
    });

    function requestPermission() {
      Promise.all([
        DeviceOrientationEvent.requestPermission(),
        DeviceMotionEvent.requestPermission()
      ]).then(() => {
        document.getElementById('select-screen').innerHTML = `
          <h1>予　言</h1>
          <p style="color:#555; font-size:13px; letter-spacing:2px; margin-bottom:10px;">カテゴリを選んでください</p>
          <button class="cat-btn" onclick="selectCategory('mark')">♦ マーク</button>
          <button class="cat-btn" onclick="selectCategory('number')">１ 数字</button>
          <button class="cat-btn" onclick="selectCategory('color')">● 色</button>
          <button class="cat-btn" onclick="selectCategory('izakaya')">🍺 居酒屋</button>
        `;
      });
    }
  </script>
</body>
</html>
