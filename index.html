<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デバッグ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      padding: 20px;
    }
    .box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      width: 280px;
    }
    .label {
      color: #c9a84c;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .val {
      font-size: 28px;
      font-weight: bold;
    }
    .val.up   { color: #e74c3c; }
    .val.down { color: #3498db; }
    button {
      padding: 14px 36px;
      background: transparent;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-size: 14px;
      letter-spacing: 4px;
      border-radius: 30px;
    }
    #status {
      color: #c9a84c;
      font-size: 14px;
      letter-spacing: 2px;
      text-align: center;
    }
  </style>
</head>
<body>

  <button onclick="requestPermission()">START</button>
  <div id="status">STARTを押してください</div>

  <div class="box">
    <div class="label">現在のbeta</div>
    <div class="val" id="betaNow">--</div>
  </div>

  <div class="box">
    <div class="label">基準beta（10秒後）</div>
    <div class="val" id="betaBase">--</div>
  </div>

  <div class="box">
    <div class="label">diffBeta（変化量）</div>
    <div class="val" id="betaDiff">--</div>
  </div>

  <div class="box">
    <div class="label">判定</div>
    <div class="val" id="judge">--</div>
  </div>

  <script>
    let phase = 'waiting';
    let baseBeta = null;
    let latestBeta = null;

    function requestPermission() {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        Promise.all([
          DeviceOrientationEvent.requestPermission(),
          DeviceMotionEvent.requestPermission()
        ]).then(() => {
          start();
        });
      } else {
        start();
      }
    }

    function start() {
      phase = 'cooldown';
      document.getElementById('status').textContent = '裏向きにして机に置いてください（10秒待機）';
      setTimeout(function() {
        if (phase === 'cooldown' && latestBeta !== null) {
          baseBeta = latestBeta;
          document.getElementById('betaBase').textContent = Math.round(baseBeta * 10) / 10;
          document.getElementById('status').textContent = '基準値確定！上下に傾けてみてください';
          phase = 'ready';
        }
      }, 10000);
    }

    window.addEventListener('deviceorientation', function(e) {
      latestBeta = e.beta;
      document.getElementById('betaNow').textContent = Math.round(e.beta * 10) / 10;

      if (phase !== 'ready') return;

      const diff = Math.round((e.beta - baseBeta) * 10) / 10;
      document.getElementById('betaDiff').textContent = diff;

      if (diff < -15) {
        document.getElementById('judge').textContent = '上方向';
        document.getElementById('judge').className = 'val up';
      } else if (diff > 15) {
        document.getElementById('judge').textContent = '下方向';
        document.getElementById('judge').className = 'val down';
      } else {
        document.getElementById('judge').textContent = '待機中';
        document.getElementById('judge').className = 'val';
      }
    });
  </script>
</body>
</html>
